  source_drive_folder_name: Data Vis 25/6A CF
  summary: This semester of Data Visualization focused on visual reasoning, chart
    design, dashboard construction, and applied storytelling with data using Tableau
    and iterative critique.
  visibility: public
  syllabus_url: https://docs.google.com/document/d/1e-Vn_D-1zV_1oVr1nyjJycX__P49kTM-/edit?usp=drivesdk&ouid=117394243753980860683&rtpof=true&sd=true
  hero_note: ''
  tags: []
  manual_overrides:
    section_label: Semester
    syllabus_markdown: "Data Vis introduces how to communicate information through\
      \ visual displays of data. The course covers visual perception basics and a\
      \ practical design framework that links data types, audience, and questions\
      \ to suitable visual solutions. You will learn the building blocks of visual\
      \ language (marks and channels), common chart forms, dashboards, and data-driven\
      \ stories, and practice evaluating visualizations critically. Hands-on work\
      \ focuses on creating effective visualizations in Tableau, from individual charts\
      \ to dashboard-based storytelling.\n\n<table class=\"course-outline-table compact-course-outline-table\"\
      >\n  <thead>\n    <tr>\n      <th>Lecture</th>\n      <th>Topic</th>\n     \
      \ <th>Focus</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>1</td>\n\
      \      <td>What is Data Visualization?</td>\n      <td>Why visualization matters;\
      \ goals of communicating information; examples and common use cases.</td>\n\
      \    </tr>\n    <tr>\n      <td>2</td>\n      <td>Data, Questions, and Audience</td>\n\
      \      <td>Abstracting a dataset; framing analytical questions; matching visuals\
      \ to audience needs and context.</td>\n    </tr>\n    <tr>\n      <td>3</td>\n\
      \      <td>Visual Perception Basics</td>\n      <td>Core perception principles\
      \ that affect readability, attention, and comparison in charts.</td>\n    </tr>\n\
      \    <tr>\n      <td>4</td>\n      <td>Visual Encoding: Marks and Channels</td>\n\
      \      <td>Choosing marks and visual channels; effectiveness trade-offs; avoiding\
      \ misleading encodings.</td>\n    </tr>\n    <tr>\n      <td>5</td>\n      <td>Chart\
      \ Design Fundamentals</td>\n      <td>Selecting and refining chart types; layout,\
      \ annotation, and clarity; common pitfalls and fixes.</td>\n    </tr>\n    <tr>\n\
      \      <td>6</td>\n      <td>Dashboards</td>\n      <td>Dashboard structure\
      \ and interaction; filtering and navigation; designing for decision-making.</td>\n\
      \    </tr>\n    <tr>\n      <td>7</td>\n      <td>Data-Driven Stories (DDS)</td>\n\
      \      <td>Narrative patterns, sequencing, and messaging; combining text and\
      \ visuals for persuasion and insight.</td>\n    </tr>\n    <tr>\n      <td>8</td>\n\
      \      <td>Tableau Studio: From Chart to Dashboard Story</td>\n      <td>Building\
      \ and critiquing Tableau work; iterative improvements from single views to integrated\
      \ dashboards.</td>\n    </tr>\n  </tbody>\n</table>"
