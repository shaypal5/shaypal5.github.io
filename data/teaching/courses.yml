  source_drive_folder_name: Data Vis - Generalized CF
  summary: I teach Data Visualization at Tel Aviv University, covering visual encoding,
    dashboard design, storytelling, and the practical craft of turning complex data
    into clear visual arguments.
  visibility: public
  syllabus_url: ''
  hero_note: This page collects shared materials from multiple iterations of the course
    together with links to individual semester pages.
  tags: []
  manual_overrides:
    hide_empty_materials: true
    opening_paragraph: Across recent semesters, the course has combined conceptual
      foundations with hands-on visual analysis work. It starts from visual perception,
      task abstraction, and the grammar of charts, then moves through chart families,
      dashboard composition, critique, and data-driven storytelling, with Tableau
      used as a practical environment for implementing and evaluating visual ideas.
    syllabus_markdown: '* Recent iterations begin with intro to data visualization,
      Tableau, and task/data abstraction.

      * The middle of the course focuses on marks and channels, chart families, arrangement,
      and dashboard design.

      * Later sessions cover data preparation, critique, and storytelling with visual
      analytics.

      * Coursework typically combines in-class exercises, homework, and a final dashboard-based
      analysis project.'
  review_notes: ''
  course_family: data-vis
  section: ''
  is_generalized: true
