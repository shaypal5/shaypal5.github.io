  - slug: datanights23
    title: Managing Data Science Teams @ DataNights
    subtitle: Cohort 2, Summer 2023
    institution: DataNights
    role: Instructor
    academic_period: 23'
    status: archived
    source_drive_folder_id: manual-datanights23
    source_drive_folder_name: DS Mgmt - Cohort #2
    summary: The second DataNights Data Science Management cohort refined the original program into a seven-session run with a stronger speaker lineup, more structured workshops, and a clearer through-line from product mindset to hiring, scale, and organizational influence.
    visibility: public
    syllabus_url: https://docs.google.com/document/d/1SQeJBjjXsgcNDgIQsD0-_JLRkd0q86ScUbhOvdC6Vcg/edit
    hero_note: ""
    tags:
      - leadership
      - datanights
      - management
    manual_overrides:
      iteration_label: "Cohort 2 · Summer 2023"
      iteration_sort_key: "02"
      opening_paragraph: "The second cohort ran from May 10, 2023 through June 21, 2023 in weekly evening sessions, co-hosted by Check Point in Tel Aviv."
      organizing_team:
        - name: Shay Palachy Affek
          role: Program lead and instructor
          company: DataNights / DataHack
        - name: DataNights volunteer staff
          role: Cohort operations, hosting, and session support
          company: "Topaz, Hila, Nurit, and Tal"
      lectures:
        - title: Intro Session
          speaker: Shay Palachy Affek
          description: An opening discussion where participants introduced themselves and surfaced the management challenges they were currently facing.
        - title: "Make It Worth: How to Successfully Deliver ML to Production"
          speaker: Dr. Inbal Budowski-Tal
          description: A framework for increasing the odds that machine learning initiatives will deliver real production value.
        - title: MVP for Data Scientists
          speaker: Topaz Gilad
          description: Product mindset, iterative delivery, and how to define a useful MVP for a data science team.
        - title: "The Bird's Eye View on DS Management"
          speaker: Tal Rosenwein
          description: Lessons from managing an entire AI and algorithms group and positioning data science as an organizational function.
        - title: "Managing a Data Science DREAM Team"
          speaker: Nurit Vatnik
          description: A framework for understanding different team archetypes and using that understanding to shape future hiring.
        - title: Interview Templates for Data Science
          speaker: Shay Palachy Affek
          description: Tradeoffs between common interview formats and how to choose the right one for a given hiring need.
        - title: DS Hiring Workshop
          speaker: Nurit Vatnik and Shay Palachy Affek
          description: A working session that turned the DREAM framework and interview templates into a custom hiring plan.
        - title: Hiring and Managing Juniors
          speaker: Alice Fridberg
          description: How to onboard and develop junior data scientists with the right feedback cadence and training roadmap.
        - title: "The Secret Sauce of Data Science Management"
          speaker: Shir Meir-Lador
          description: Managing up, down, and across while choosing the right projects to maximize the organization's data science value.
        - title: Data Science at Scale
          speaker: Mor Hananovitz
          description: The practical risks that appear when a promising proof of concept meets larger-scale production reality.
        - title: Corporate Dynamics
          speaker: Shay Yahal
          description: Building coalitions inside organizations and growing the influence needed to get cross-functional work done.
        - title: Data Science Frameworks
          speaker: Shay Palachy Affek
          description: Frameworks for scoping, structuring, and shipping ambiguous data science work.
        - title: Frameworks Practice
          speaker: Shay Palachy Affek
          description: A workshop for participants to adapt the framework ideas to their own teams and projects.
      hide_empty_materials: true
    review_notes: Backfilled from the second DataNights DS Management cohort syllabus and planning materials.
    course_family: datanights
    section: ""
    is_generalized: false
