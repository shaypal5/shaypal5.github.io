  - slug: datanights22
    title: Managing Data Science Teams @ DataNights
    subtitle: Cohort 1, Summer 2022
    institution: DataNights
    role: Instructor
    academic_period: 22'
    status: archived
    source_drive_folder_id: manual-datanights22
    source_drive_folder_name: DS Mgmgt - Cohort #1
    summary: The first DataNights Data Science Management cohort focused on the practical realities of leading data science teams, from project roadmaps and product work to recruiting, feedback, and peer review.
    visibility: public
    syllabus_url: https://docs.google.com/document/d/1EjaA6QbHYEFnSq1S_Sn4yLXOpXrYwCEL1r0bRybfd4M/edit
    hero_note: ""
    tags:
      - leadership
      - datanights
      - management
    manual_overrides:
      iteration_label: "Cohort 1 · Summer 2022"
      iteration_sort_key: "01"
      opening_paragraph: "The first cohort ran from August 3, 2022 through September 14, 2022 in weekly evening sessions, hosted by Forter in Tel Aviv."
      organizing_team:
        - name: Shay Palachy Affek
          role: Program lead and instructor
          company: DataNights / DataHack
        - name: DataNights / DataHack volunteer organizing team
          role: Cohort operations and community support
      lectures:
        - title: "5 Things I Learned as a DS Manager"
          speaker: Ilana Klovatch
          description: Lessons on methodology, team strengths, and leading people with different skill profiles.
          link: https://docs.google.com/presentation/d/1IlTpBmAKRTYyzgTV4rizDJhrYGW079_1/edit?usp=drivesdk
        - title: "Make It Worth: How to Successfully Deliver ML to Production"
          speaker: Inbal Budowski-Tal
          description: A practical talk about the production pitfalls that keep ML projects from delivering real business impact.
        - title: "Data Science Project Workflow + DS Playbooks for DS Teams"
          speaker: Shay Palachy Affek
          description: Frameworks and workflow patterns for structuring data science projects and team practices.
        - title: "Data Science and Product Management: Function or Dysfunction, There Is No Try"
          speaker: Adina Lederhendler
          description: A talk about how data science leaders can work effectively with product managers despite uncertainty and technical translation gaps.
        - title: "Objective-KPI Alignment in Data Science Projects"
          speaker: Shay Palachy Affek
          description: A discussion of how technical objectives in data science work align or misalign with business and product KPIs.
          link: https://docs.google.com/presentation/d/1h0s1MkIzAVwfltQVWXeNiKD51OoP0qelEpKhr_v7Pz8/edit?usp=sharing
        - title: "Building a Data Science Team: How to Get the Right People and Make Them Work Together Efficiently"
          speaker: Nurit Vatnik
          description: On selecting from diverse backgrounds and shaping a team that collaborates well.
          link: https://drive.google.com/file/d/1sP9CPCnO2hqWeYhY5THMTDQSCA9YmTud/view?usp=drivesdk
        - title: "Interview Templates for Different Seniority Levels of Data Scientist"
          speaker: Shay Palachy Affek
          description: A practical framework for adapting technical data science interviews to different seniority levels.
        - title: "DS Archetypes & DS Tech Interviews"
          speaker: The cohort
          description: A hands-on group activity that turned the archetype and interview frameworks into concrete hiring changes.
          link: https://docs.google.com/presentation/d/1U7VwvOC_aMmbJw4PseQhJNEjqcal-bh7nO9HeFlFheA/edit?usp=drivesdk
        - title: "The Imposter Syndrome: Managing Senior Data Scientists, and Keeping Up with Team Knowledge When You Are Not Hands-On"
          speaker: Adi Nesher
          description: A talk about leading experienced researchers and senior practitioners without needing to outsmart them.
        - title: "The Right Project Mixture: Maintaining What's Working While Delivering Innovation"
          speaker: Amit Weil
          description: How data science leaders balance model maintenance responsibilities with delivering novel work.
        - title: "Data Science, Validated: Testing & Monitoring ML Projects"
          speaker: Shir Chorev
          description: Model monitoring, failure detection, and how to keep production ML systems healthy over time.
        - title: "The Secret Sauce of Data Science Management"
          speaker: Shir Meir-Lador
          description: Lessons on building teams that thrive while still delivering winning results for the organization.
          link: https://docs.google.com/presentation/d/1gVXtk9-fzuM-2-nFdfYqhV72CYxW3jTY6zfmWGGubB4/edit
        - title: "Peer Review in Data Science Projects"
          speaker: Shay Palachy Affek
          description: A talk about adapting peer-review practices to data science work to improve decision making and output quality.
        - title: "Participants Takeaways"
          speaker: The cohort
          description: A closing session for participants to share what they had already applied from the program.
        - title: "Lecture Workshop"
          speaker: The cohort
          description: A collaborative workshop on ideas and possible additions for future cohorts.
      hide_empty_materials: true
    review_notes: Backfilled from the first DataNights DS Management cohort syllabus and participant materials.
