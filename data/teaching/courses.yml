      \ and build representations such as Bag-of-Words, TF-IDF, n-grams, and embeddings.\
      \ The course covers supervised and unsupervised analysis (including clustering\
      \ and topic modeling), model evaluation and error analysis, and moves on to\
      \ attention, Transformers, BERT/SBERT, prompting, and retrieval-augmented generation\
      \ (RAG) for practical NLP systems.\n\n<table class=\"course-outline-table compact-course-outline-table\"\
