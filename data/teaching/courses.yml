  title: Data Vis @ TAU
  subtitle: Course page for teaching materials, 23/24 (Semester A)
  institution: Unknown institution
  role: Instructor
  academic_period: 23/24
  status: active
  source_drive_folder_id: 1gBQw8Iz7Ru5zr_FNdlYh5q7Fs0R39e1n
  source_drive_folder_name: Data Vis 23/4A CF
  summary: This semester of Data Visualization focused on visual reasoning, chart
    design, dashboard construction, and applied storytelling with data using Tableau
    and iterative critique.
  visibility: public
  syllabus_url: https://docs.google.com/spreadsheets/d/11DuK_yWVRueLXz3tAA4zQiNFmirYjN5gtTEdK5hfeok/edit?usp=drivesdk
  hero_note: ''
  tags: []
  manual_overrides:
    section_label: Semester
    materials_note: This semester's page intentionally exposes only a compact public
      subset of available materials. The fuller course framing lives in the outline
      above, while the shared Data Vis page collects reusable lecture materials across
      semesters.
    syllabus_markdown: "Data Vis (Semester A 23/24) introduces the purpose and foundations\
      \ of data visualization and builds practical skills in Tableau. You\u2019ll\
      \ move from defining visualization and its history to data abstraction, task\
      \ abstraction, and encoding with marks and channels. The course then focuses\
      \ on chart types, perception and Gestalt principles, interaction, manipulation,\
      \ and dashboard design. Along the way you\u2019ll practice chart critique, decoding,\
      \ and iterative building, culminating in a final project and (optional) data-driven\
      \ storytelling.\n\n<table class=\"course-outline-table compact-course-outline-table\"\
      >\n  <thead>\n    <tr>\n      <th>Lecture</th>\n      <th>Topic</th>\n     \
      \ <th>Focus</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>Week\
      \ 1 (03/01/24)</td>\n      <td>Why Data Visualization?</td>\n      <td>Motivation\
      \ for data vis, brief history, core definitions, and an intuitive introduction\
      \ to what visualization does and why it matters.</td>\n    </tr>\n    <tr>\n\
      \      <td>Week 2 (10/01/24)</td>\n      <td>Data Abstraction + Tableau Basics</td>\n\
      \      <td>What to visualize (data abstraction) and how Tableau is organized:\
      \ interface tour, worksheets vs dashboards vs stories, dimensions vs measures,\
      \ first build with a sample dataset.</td>\n    </tr>\n    <tr>\n      <td>Week\
      \ 2\u20133</td>\n      <td>Data Preparation</td>\n      <td>Loading, cleaning,\
      \ and preparing data for analysis and visualization workflows.</td>\n    </tr>\n\
      \    <tr>\n      <td>Week 3 (17/01/24)</td>\n      <td>Task Abstraction + Marks\
      \ & Channels</td>\n      <td>Why you visualize (tasks and goals) and how you\
      \ encode data: marks, channels, and how to read/decode charts critically.</td>\n\
      \    </tr>\n    <tr>\n      <td>Catch-Up Week (24/01/24)</td>\n      <td>Foundations\
      \ Review</td>\n      <td>Consolidation of early concepts: definitions, abstraction\
      \ (what/why), and marks & channels.</td>\n    </tr>\n    <tr>\n      <td>Week\
      \ 4 (31/01/24)</td>\n      <td>Chart Types + Perception & Gestalt</td>\n   \
      \   <td>Selecting chart types and understanding how people perceive visuals;\
      \ Gestalt principles and common perceptual pitfalls.</td>\n    </tr>\n    <tr>\n\
      \      <td>Week 4\u20135</td>\n      <td>Implementing Charts in Tableau + Critique</td>\n\
      \      <td>Building charts in Tableau, adding basic interactivity, and practicing\
      \ structured visualization critique.</td>\n    </tr>\n    <tr>\n      <td>Week\
      \ 5 and after (07/02/24+)</td>\n      <td>Interaction, Manipulation, and Dashboards\
      \ (Optional: Storytelling)</td>\n      <td>Chart-level interactions, manipulating\
      \ and arranging views, combining sheets into dashboards, dashboard rules and\
      \ analysis, and (optionally) data-driven storytelling patterns.</td>\n    </tr>\n\
      \  </tbody>\n</table>"
  review_notes: ''
  course_family: data-vis
  section: A
  is_generalized: false
