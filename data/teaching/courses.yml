  summary: This semester of Data Visualization focused on visual reasoning, chart
    design, dashboard construction, and applied storytelling with data using Tableau
    and iterative critique.
  visibility: public
  syllabus_url: https://docs.google.com/document/d/1iR93WghTVh2SIckc_GRcFVRuJ7AmeSUVgM86clkqii4/edit?usp=drivesdk
  hero_note: ''
  tags: []
  manual_overrides:
    section_label: Semester
    syllabus_markdown: "This semester covers the full workflow of data visualization:\
      \ understanding audience and task, choosing the right abstractions and chart\
      \ forms, building dashboards in Tableau, and critiquing visual choices so that\
      \ data stories stay both accurate and readable.\n\n<table class=\"course-outline-table\
      \ compact-course-outline-table\">\n  <thead>\n    <tr>\n      <th>Lecture</th>\n\
      \      <th>Topic</th>\n      <th>Focus</th>\n    </tr>\n  </thead>\n  <tbody>\n\
      \    <tr>\n      <td>1</td>\n      <td>Course framing and intro to data visualization</td>\n\
      \      <td>Why visualization matters, examples, and course structure.</td>\n\
      \    </tr>\n    <tr>\n      <td>2</td>\n      <td>Task and data abstraction</td>\n\
      \      <td>Turning messy analytical questions into formal visual tasks and data\
      \ types.</td>\n    </tr>\n    <tr>\n      <td>3</td>\n      <td>Marks, channels,\
      \ and chart grammar</td>\n      <td>How visual encodings shape readability and\
      \ interpretation.</td>\n    </tr>\n    <tr>\n      <td>4</td>\n      <td>Chart\
      \ families and design tradeoffs</td>\n      <td>Selecting chart types and avoiding\
      \ misleading comparisons.</td>\n    </tr>\n    <tr>\n      <td>5</td>\n    \
      \  <td>Data preparation and Tableau workflows</td>\n      <td>Preparing data\
      \ and implementing visual ideas in Tableau.</td>\n    </tr>\n    <tr>\n    \
      \  <td>6</td>\n      <td>Dashboards, interaction, and storytelling</td>\n  \
      \    <td>Combining views into coherent dashboards and data-driven narratives.</td>\n\
      \    </tr>\n  </tbody>\n</table>"
  review_notes: ''
  course_family: data-vis
  section: A
  is_generalized: false
