  visibility: public
  syllabus_url: https://docs.google.com/document/d/1CTXdQZVnF-VxSe58RIE07r8LSiWEhRxC/edit?usp=drivesdk&ouid=117394243753980860683&rtpof=true&sd=true
  hero_note: ''
  tags: []
  manual_overrides:
    section_label: Semester
    syllabus_markdown: "Text Mining (Semester A) introduces automated analysis of\
      \ large collections of text, with emphasis on social media and user-generated\
      \ content. The course covers both unsupervised methods for discovering patterns,\
      \ trends, and topics, and supervised methods for classifying text into predefined\
      \ categories. Key applications include sentiment analysis (positive/negative/neutral),\
      \ basic NLP pipelines, and presenting text-based findings through clear visualizations.\n\
      \n<table class=\"course-outline-table compact-course-outline-table\">\n  <thead>\n\
      \    <tr>\n      <th>Lecture</th>\n      <th>Topic</th>\n      <th>Focus</th>\n\
      \    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>Block 1</td>\n      <td>Text\
      \ mining overview and use cases</td>\n      <td>What text mining is, where text\
      \ data comes from (social media, reviews, comments), and how to frame business\
      \ and research questions.</td>\n    </tr>\n    <tr>\n      <td>Block 2</td>\n\
      \      <td>Text data preparation and representation</td>\n      <td>Cleaning\
      \ and structuring text data; turning text into analyzable formats; exploratory\
      \ analysis and simple visual summaries.</td>\n    </tr>\n    <tr>\n      <td>Block\
      \ 3</td>\n      <td>Unsupervised text analysis: trends and topics</td>\n   \
      \   <td>Finding patterns without labels, including trend detection and summarizing\
      \ main themes in a corpus.</td>\n    </tr>\n    <tr>\n      <td>Block 4</td>\n\
      \      <td>Feature engineering for text</td>\n      <td>Building useful text\
      \ features (e.g., term weights such as TF-IDF) and understanding their strengths\
      \ and limitations.</td>\n    </tr>\n    <tr>\n      <td>Block 5</td>\n     \
      \ <td>Supervised text classification</td>\n      <td>Training models to assign\
      \ documents to predefined classes; basic evaluation and practical modeling considerations.</td>\n\
      \    </tr>\n    <tr>\n      <td>Block 6</td>\n      <td>Sentiment analysis</td>\n\
      \      <td>Methods and workflows for detecting polarity (positive/negative/neutral)\
      \ and interpreting results in real applications.</td>\n    </tr>\n    <tr>\n\
      \      <td>Block 7</td>\n      <td>Basic NLP models and pipelines</td>\n   \
      \   <td>Core NLP building blocks used in modern text analysis and how to combine\
      \ them into end-to-end solutions.</td>\n    </tr>\n    <tr>\n      <td>Block\
      \ 8</td>\n      <td>Communicating results with visuals</td>\n      <td>Presenting\
      \ text mining outputs clearly: charts and summaries for trends, topics, and\
      \ classification outcomes.</td>\n    </tr>\n  </tbody>\n</table>"
  review_notes: ''
