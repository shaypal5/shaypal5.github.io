    section_label: Semester
    syllabus_markdown: "Data Vis (23/24 Semester B) introduces why data visualization\
      \ matters and how to design and critique effective charts. The course covers\
      \ the history and definition of data vis, data and task abstraction, marks and\
      \ channels, perception and Gestalt, chart types, interaction, and dashboard\
      \ design. You will practice these ideas using Tableau, moving from basic chart\
      \ building and data preparation to interactive dashboards and (optionally) data-driven\
      \ storytelling.\n\n<table class=\"course-outline-table compact-course-outline-table\"\
      >\n  <thead>\n    <tr>\n      <th>Lecture</th>\n      <th>Topic</th>\n     \
      \ <th>Focus</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>Week\
      \ 1 (29/05/24)</td>\n      <td>Why Data Vis?</td>\n      <td>Motivation for\
      \ visualization; brief history; intuitive introduction; what counts as data\
      \ visualization.</td>\n    </tr>\n    <tr>\n      <td>Week 2 (05/06/24)</td>\n\
      \      <td>What: Data Abstraction + Tableau Basics</td>\n      <td>Data abstraction;\
      \ Tableau orientation (worksheets vs dashboards vs stories, interface, dimensions\
      \ vs measures); first charts using a sample dataset.</td>\n    </tr>\n    <tr>\n\
      \      <td>Week 2.5</td>\n      <td>Data Preparation</td>\n      <td>Loading\
      \ and preparing data for analysis and visualization workflows.</td>\n    </tr>\n\
      \    <tr>\n      <td>Week 3 (12/06/24)</td>\n      <td>Why + How: Tasks, Marks\
      \ & Channels</td>\n      <td>Task abstraction (why we visualize); encoding with\
      \ marks and channels; decoding and critiquing charts.</td>\n    </tr>\n    <tr>\n\
      \      <td>Catch Up Week (19/06/24)</td>\n      <td>Catch Up: Core Foundations</td>\n\
      \      <td>Review of weeks 1\u20133 topics: motivation, data abstraction, task\
      \ abstraction, and marks & channels.</td>\n    </tr>\n    <tr>\n      <td>Week\
      \ 4 (26/06/24)</td>\n      <td>Perception, Gestalt, and Chart Types</td>\n \
      \     <td>Visual perception principles and Gestalt; selecting appropriate chart\
      \ types.</td>\n    </tr>\n    <tr>\n      <td>Week 4\u20135</td>\n      <td>Implementing\
      \ Charts & Interactivity in Tableau</td>\n      <td>Building chart types in\
      \ Tableau; chart-level interactions; critique and refinement of interactive\
      \ designs.</td>\n    </tr>\n    <tr>\n      <td>Week 5+</td>\n      <td>Dashboards\
      \ (and Optional Storytelling)</td>\n      <td>Combining sheets into dashboards;\
      \ dashboard rules and layout; adding interactivity; optional data-driven storytelling\
      \ and common story structures.</td>\n    </tr>\n  </tbody>\n</table>"
