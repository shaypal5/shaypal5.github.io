      \      <td>Text mining & NLP overview</td>\n      <td>Core tasks, data sources,\
      \ problem framing, and how text becomes analyzable data.</td>\n    </tr>\n \
      \   <tr>\n      <td>2</td>\n      <td>Cleaning and preprocessing pipelines</td>\n\
      \      <td>Tokenization, normalization, stopwords, stemming/lemmatization, dataset\
      \ splits, and common pitfalls.</td>\n    </tr>\n    <tr>\n      <td>3</td>\n\
      \      <td>Classical vectorization</td>\n      <td>Bag-of-Words, TF-IDF, n-grams,\
