  source_drive_folder_name: Deep Learning 25/6B CF
  summary: This semester of Deep Learning focused on practical neural-network modeling
    in PyTorch, from optimization and core architectures through sequence models,
    transformers, and modern generative methods.
  visibility: public
  syllabus_url: https://docs.google.com/document/d/1lEbjRVUOG0tZ57mFqS3pIihUlkR1DKcZ/edit?usp=drivesdk&ouid=117394243753980860683&rtpof=true&sd=true
  hero_note: ''
  tags: []
  manual_overrides:
    section_label: Semester
    syllabus_markdown: "Deep Learning (Semester B, 25/26) introduces neural networks\
      \ from core principles to modern architectures and real-world practice. You\
      \ will build, train, and evaluate models in Python with PyTorch, covering optimization\
      \ and regularization, computer vision, NLP, and time-series tasks. The course\
      \ also explores transfer learning and large-scale pretraining, plus key generative\
      \ approaches such as autoencoders, VAEs, GANs, and diffusion models, with emphasis\
      \ on critical evaluation, error analysis, robustness, and responsible deployment.\n\
      \n<table class=\"course-outline-table compact-course-outline-table\">\n  <thead>\n\
      \    <tr>\n      <th>Lecture</th>\n      <th>Topic</th>\n      <th>Focus</th>\n\
      \    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>1</td>\n      <td>Neural\
      \ Networks Foundations</td>\n      <td>Perceptrons to MLPs, forward/backpropagation,\
      \ losses, initialization, training basics in PyTorch.</td>\n    </tr>\n    <tr>\n\
      \      <td>2</td>\n      <td>Training Deep Models</td>\n      <td>Optimization\
      \ (SGD/Adam), learning-rate schedules, regularization (dropout, weight decay),\
      \ batch normalization, debugging training.</td>\n    </tr>\n    <tr>\n     \
      \ <td>3</td>\n      <td>Convolutional Neural Networks for Vision</td>\n    \
      \  <td>CNN building blocks, modern conv nets, residual connections, image classification\
      \ workflows and evaluation.</td>\n    </tr>\n    <tr>\n      <td>4</td>\n  \
      \    <td>Sequence Models for Time Series and Text</td>\n      <td>RNNs, LSTM,\
      \ GRU; handling variable-length sequences, teacher forcing, common failure modes.</td>\n\
      \    </tr>\n    <tr>\n      <td>5</td>\n      <td>Attention and Transformers</td>\n\
      \      <td>Self-attention, encoder/decoder Transformers, sequence-to-sequence,\
      \ practical NLP pipelines.</td>\n    </tr>\n    <tr>\n      <td>6</td>\n   \
      \   <td>Transfer Learning and Fine-Tuning</td>\n      <td>Using pretrained models,\
      \ feature extraction vs full fine-tuning, domain shift, scaling considerations.</td>\n\
      \    </tr>\n    <tr>\n      <td>7</td>\n      <td>Generative Models I: Autoencoders\
      \ and VAEs</td>\n      <td>Representation learning, reconstruction vs likelihood,\
      \ latent spaces, VAE training and sampling.</td>\n    </tr>\n    <tr>\n    \
      \  <td>8</td>\n      <td>Generative Models II: GANs and Diffusion</td>\n   \
      \   <td>Adversarial training basics, diffusion model intuition and training,\
      \ strengths/limits, evaluation and safety considerations.</td>\n    </tr>\n\
      \  </tbody>\n</table>"
  review_notes: ''
