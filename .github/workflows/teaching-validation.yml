name: Teaching Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install automation dependencies
        run: pip install .

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run teaching validation
        run: python -m automation.cli courses validate

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "2.6"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
